<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoApply</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-a: #050b16;
      --bg-b: #0f172a;
      --panel: rgba(15, 23, 42, 0.78);
      --border: rgba(148, 163, 184, 0.22);
      --text: #dbe7ff;
      --muted: #8ea3c8;
      --brand-a: #1d4ed8;
      --brand-b: #06b6d4;
      --ok: #22c55e;
      --warn: #f59e0b;
    }

    body {
      width: 430px;
      min-height: 540px;
      font-family: "Segoe UI", "Arial", sans-serif;
      background: radial-gradient(circle at 20% 0%, #163770 0%, transparent 45%), linear-gradient(145deg, var(--bg-a), var(--bg-b));
      color: var(--text);
      overflow: hidden;
    }

    .shell {
      border: 1px solid rgba(125, 154, 206, 0.18);
      margin: 10px;
      border-radius: 16px;
      background: rgba(7, 12, 23, 0.72);
      backdrop-filter: blur(10px);
      overflow: hidden;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    .header {
      padding: 18px 18px 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      background: linear-gradient(135deg, rgba(29, 78, 216, 0.3), rgba(6, 182, 212, 0.15));
    }

    .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
      background: linear-gradient(90deg, #60a5fa, #22d3ee);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    .content {
      max-height: 430px;
      overflow-y: auto;
      padding: 16px;
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(96, 165, 250, 0.35);
      border-radius: 99px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(34, 197, 94, 0.35);
      background: rgba(34, 197, 94, 0.12);
      margin-bottom: 14px;
      font-size: 12px;
      font-weight: 700;
      color: #bbf7d0;
    }

    .status.inactive {
      border-color: rgba(148, 163, 184, 0.3);
      background: rgba(148, 163, 184, 0.12);
      color: #cbd5e1;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 99px;
      background: var(--ok);
      animation: blink 1.8s infinite;
      flex-shrink: 0;
    }

    .status.inactive .status-dot {
      background: #94a3b8;
      animation: none;
    }

    @keyframes blink {
      50% { opacity: 0.45; }
    }

    .section {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 12px;
    }

    .section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 82px 1fr;
      align-items: start;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    .label {
      color: #b6c6e6;
      font-weight: 700;
    }

    .value {
      color: var(--text);
      word-break: break-word;
      line-height: 1.45;
    }

    .resume {
      padding: 10px;
      background: rgba(13, 22, 44, 0.75);
      border: 1px solid rgba(96, 165, 250, 0.25);
      border-radius: 10px;
      font-size: 11px;
      max-height: 90px;
      overflow-y: auto;
      color: #c6d9ff;
      margin-top: 8px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .portals {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .badge {
      border: 1px solid rgba(96, 165, 250, 0.35);
      background: rgba(30, 64, 175, 0.16);
      color: #bfdbfe;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      padding: 8px;
      text-align: center;
    }

    .empty {
      text-align: center;
      border: 1px dashed rgba(148, 163, 184, 0.4);
      border-radius: 12px;
      padding: 28px 16px;
      color: #9fb1d3;
      font-size: 12px;
      line-height: 1.6;
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(3, 8, 18, 0.6);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
      color: white;
      box-shadow: 0 8px 20px rgba(29, 78, 216, 0.35);
    }

    .btn-secondary {
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: rgba(30, 41, 59, 0.55);
      color: #d7e4ff;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .timestamp {
      text-align: center;
      font-size: 10px;
      color: #8da4cb;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <h1 class="title">AutoApply</h1>
      <p class="subtitle">Smart Job Application Autofill</p>
    </header>

    <main class="content">
      <div id="status-container"></div>
      <div id="data-container"></div>
    </main>

    <footer class="footer">
      <button id="open-app" class="btn-primary">Open Web App</button>
      <button id="refresh" class="btn-secondary">Refresh</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
